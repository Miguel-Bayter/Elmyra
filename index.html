<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elmyra — Your Emotional Companion</title>
    <!-- Anti-FOUC: read persisted theme before React mounts to avoid light flash -->
    <script>
      try {
        var p = JSON.parse(localStorage.getItem('elmyra_preferences') || '{}');
        if (p.theme === 'dark') document.documentElement.dataset.theme = 'dark';
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
